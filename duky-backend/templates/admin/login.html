<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Duky Barber</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold: #C9A84C; --gold-light: #E8C97A;
      --dark: #0E0E0E; --dark-2: #181818; --dark-3: #222;
      --text: #F0EDE6; --muted: #888880; --border: rgba(201,168,76,0.2);
    }
    body { background:var(--dark); color:var(--text); font-family:'Segoe UI',sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:var(--dark-2); border:1px solid var(--border); border-radius:10px;
            padding:2.5rem 2rem; width:100%; max-width:380px; }
    .brand { font-size:1.8rem; font-weight:800; color:var(--gold); letter-spacing:0.05em;
             text-align:center; margin-bottom:0.3rem; }
    .sub   { text-align:center; color:var(--muted); font-size:0.82rem; margin-bottom:2rem; }
    label  { display:block; font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase;
             color:var(--muted); margin-bottom:6px; }
    input  { width:100%; background:var(--dark-3); border:1px solid var(--border);
             color:var(--text); padding:11px 14px; border-radius:6px; font-size:0.9rem;
             margin-bottom:1.1rem; transition:border-color .2s; }
    input:focus { outline:none; border-color:var(--gold); }
    button { width:100%; background:var(--gold); color:var(--dark); border:none;
             padding:12px; border-radius:6px; font-weight:600; font-size:0.9rem;
             letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;
             transition:background .2s; }
    button:hover { background:var(--gold-light); }
    .error { background:rgba(220,53,69,0.15); border:1px solid rgba(220,53,69,0.4);
             color:#ff6b6b; padding:10px 14px; border-radius:6px; font-size:0.85rem;
             margin-bottom:1rem; }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Duky Barber</p>
    <p class="sub">Panel de Administración</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" placeholder="admin" required autofocus>

      <label for="clave">Contraseña</label>
      <input type="password" id="clave" name="clave" placeholder="••••••••" required>

      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
